<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#3658ad]">
    <div class="w-[100vw] h-[100vh] flex justify-center items-center">
        <form class="bg-white w-[400px] h-[370px] rounded-[25px] p-[25px] shadow-xl flex flex-col gap-[25px]" id="form">
            <h2 class="text-center text-[22px] text-[#3658ad] font-bold">Login Here</h2>
            <label class="relative">
                <i class="fa-solid fa-envelope absolute left-[5px] top-[11px]"></i>
                <input type="email" placeholder="Email" class="w-[340px] border-blue-300 bg-[#efefef] rounded pl-[25px] py-[7px] placeholder:text-[black]" id="email">
            </label>
            <label class="relative">
                <i class="fa-solid fa-lock absolute left-[5px] top-[11px]"></i>
                <i class="fa-solid fa-eye absolute top-[12px] right-[15px] cursor-pointer" id="eye"></i>
                <i class="fa-solid fa-eye-slash absolute top-[12px] right-[15px] cursor-pointer" style="display: none;" id="eye-slash"></i>
                <input type="password" placeholder="Password" class="w-[340px] border-blue-300 bg-[#efefef] rounded pl-[25px] py-[7px] placeholder:text-[black]" id="password">
            </label>
            <button class="bg-[#3658ad] p-[10px] rounded-[15px] cursor-pointer text-white mt-[25px] font-bold">Login</button>
            <p class="text-center">Not registered?<a href="./index.html" class=" text-[#3658ad] cursor-pointer ">Register</a></p>
        </form>
    </div>
    <script src="login.js"></script>
</body>
</html>
